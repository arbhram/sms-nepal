<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="hgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="hgradContainer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="hShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon container -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="120" height="120" rx="28" ry="28" fill="url(#hgradContainer)" filter="url(#hShadow)"/>
    <!-- W lines -->
    <g stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 26 44 L 47 78 L 60 59 L 73 78 L 94 44"/>
    </g>
    <!-- 4 dots -->
    <g fill="#ffffff">
      <circle cx="26" cy="44" r="7"/>
      <circle cx="47" cy="78" r="7"/>
      <circle cx="73" cy="78" r="7"/>
      <circle cx="94" cy="44" r="7"/>
    </g>
    <circle cx="60" cy="59" r="3" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <text x="190" y="130"
        font-family="'Inter', 'Helvetica Neue', system-ui, sans-serif"
        font-size="92"
        font-weight="600"
        letter-spacing="-3"
        fill="#0F172A">wephas</text>
</svg>
