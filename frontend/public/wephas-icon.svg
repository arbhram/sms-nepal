<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square container -->
  <rect x="56" y="56" width="400" height="400" rx="96" ry="96" fill="url(#grad)" filter="url(#softShadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="56" y="56" width="400" height="400" rx="96" ry="96" fill="url(#dotGlow)" opacity="0.35"/>

  <!-- Connecting lines forming an abstract W -->
  <!-- Path: dot1 → dot2 → dot3 → dot4 -->
  <g stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <path d="M 144 184 L 216 328 L 256 248 L 296 328 L 368 184"/>
  </g>

  <!-- 4 dots at the W vertices -->
  <g fill="#ffffff">
    <circle cx="144" cy="184" r="26"/>
    <circle cx="216" cy="328" r="26"/>
    <circle cx="296" cy="328" r="26"/>
    <circle cx="368" cy="184" r="26"/>
  </g>

  <!-- Subtle accent dot at center peak for "intelligence" node -->
  <circle cx="256" cy="248" r="10" fill="#ffffff" opacity="0.85"/>
</svg>
