# /etc/nginx/sites-available/sms-nepal
# Symlink: ln -s /etc/nginx/sites-available/sms-nepal /etc/nginx/sites-enabled/

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name myschoolsaas.com *.myschoolsaas.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — handles apex + all subdomains via wildcard cert
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myschoolsaas.com *.myschoolsaas.com;

    # Wildcard TLS cert issued by Certbot (DNS-01 / Cloudflare)
    ssl_certificate     /etc/letsencrypt/live/myschoolsaas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myschoolsaas.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    root /var/www/sms-nepal/dist;
    index index.html;

    # Forward API requests to Node backend (preserving Host header for tenantResolver)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Serve uploaded files from backend
    location /uploads/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # SPA fallback — let React Router handle all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Custom domain support — catch-all for any other verified custom domain
# (Certbot will need a separate cert per custom domain, or use a wildcard via DNS-01)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<customdomain>.+)$;

    # Placeholder — replace with the actual cert paths for each custom domain,
    # or use a wildcard cert if the custom domains share a parent domain.
    # For fully custom domains (e.g. school.edu.np), obtain certs individually:
    #   certbot certonly --nginx -d school.edu.np
    ssl_certificate     /etc/letsencrypt/live/$customdomain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$customdomain/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sms-nepal/dist;
    index index.html;

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
